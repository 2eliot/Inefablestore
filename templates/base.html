<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ site_name|default('InefableStore') }}</title>
    <link rel="icon" href="{{ url_for('static', filename='561553627_18409264204136226_1099017029378111495_n.ico') }}" type="image/x-icon">
    <link rel="shortcut icon" href="{{ url_for('static', filename='561553627_18409264204136226_1099017029378111495_n.ico') }}" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    {% block styles %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css', v='8') }}">
    {% endblock %}
  </head>
  <body class="{{ body_class|default('') }}">
    <div class="scale-wrap">
    {% block header %}
      <header class="topbar">
        <button id="admin-hamburger" class="btn-ghost" aria-label="Menú" title="Menú" style="margin-right:8px; display:none;">☰</button>
        <div class="brand">{{ site_name|default('InefableStore') }}</div>
      </header>
    {% endblock %}

    <main class="container">
      {% block content %}{% endblock %}
    </main>
    </div>
    <!-- Mobile drawer for admin tabs -->
    <aside id="admin-drawer" class="admin-drawer" hidden>
      <div class="drawer-backdrop"></div>
      <div class="drawer-panel" role="dialog" aria-modal="true" aria-label="Menú de administración">
        <nav id="admin-drawer-tabs" class="tabs" role="tablist" aria-label="Pestañas de administración (móvil)"></nav>
      </div>
    </aside>

    {% block scripts %}
    <script src="{{ url_for('static', filename='js/admin.js', v='19') }}" defer></script>
    {% endblock %}
  </body>
</html>
